<mat-toolbar class="secondary-toolbar">
    <!-- Azioni sinistra -->
    <div class="cluster">
        <!-- GRUPPO 1: Azioni Server (Principali) -->
        <button mat-icon-button aria-label="Salva sul Robot" (click)="saveFsm()" matTooltip="Salva sul Robot (Ctrl+S)" [disabled]="isGraphEmpty$ | async">
            <mat-icon>save</mat-icon>
        </button>

        <button mat-icon-button aria-label="Ricarica dal Robot" (click)="loadFsmFromServer()" matTooltip="Ricarica stato dal Robot">
            <mat-icon>cloud_download</mat-icon>
        </button>

        <span class="v-divider" aria-hidden="true"></span>

        <!-- GRUPPO 2: Azioni File Locale -->
        <button mat-icon-button aria-label="Esporta JSON" (click)="downloadFsm()" matTooltip="Esporta file JSON" [disabled]="isGraphEmpty$ | async">
            <mat-icon>file_download</mat-icon>
        </button>

        <button mat-icon-button aria-label="Importa JSON" (click)="triggerImportJson()" matTooltip="Importa file JSON">
            <mat-icon>file_upload</mat-icon>
        </button>
        <input hidden #fileInput type="file" (change)="onFileSelected($event)" accept=".json">

        <button mat-icon-button aria-label="Azzera canvas" (click)="clearCanvas()" matTooltip="Azzera canvas" [disabled]="isGraphEmpty$ | async">
            <mat-icon>delete_sweep</mat-icon>
        </button>

        <span class="v-divider" aria-hidden="true"></span>

        <span matTooltip="Annulla (Ctrl+Z)">
            <button mat-icon-button aria-label="Annulla" (click)="graphService.undo()"
                [disabled]="!(graphService.canUndo$ | async)">
                <mat-icon>undo</mat-icon>
            </button>
        </span>
        <span matTooltip="Ripristina (Ctrl+Y)">
            <button mat-icon-button aria-label="Ripristina" (click)="graphService.redo()"
                [disabled]="!(graphService.canRedo$ | async)">
                <mat-icon>redo</mat-icon>
            </button>
        </span>
    </div>

    <span class="spacer"></span>

    <!-- Nome file al centro -->
    <div class="filename" (dblclick)="startRename()" [attr.title]="fileName">
        <mat-icon>description</mat-icon>
        <input *ngIf="renaming" [(ngModel)]="fileName" (blur)="stopRename()" (keydown.enter)="stopRename()"
            aria-label="Nome file" />
        <span *ngIf="!renaming">{{ fileName }}</span>
    </div>

    <span class="spacer"></span>

    <!-- Searchbar custom: 36px, centrata dentro la toolbar -->
    <div class="cluster" style="position: relative;">
        <div class="searchbar" [class.has-error]="searchError">
            <mat-icon>search</mat-icon>
            <input
                type="text"
                [(ngModel)]="q"
                (keydown.enter)="onSearch(q)"
                (input)="searchError = ''"
                placeholder="Cerca"
                [matAutocomplete]="nodeAuto"
            />
            <mat-autocomplete #nodeAuto="matAutocomplete" (optionSelected)="onSuggestionSelected($event.option.value)">
                <mat-option *ngFor="let name of filteredNodeSuggestions" [value]="name">
                    {{ name }}
                </mat-option>
            </mat-autocomplete>
            <button *ngIf="q" class="icon-btn" aria-label="Pulisci" (click)="q = ''; searchError = ''">
                <mat-icon>close</mat-icon>
            </button>
        </div>
        <div class="search-feedback" *ngIf="searchError">{{ searchError }}</div>
    </div>
</mat-toolbar>

<!-- GRID a 5 colonne: [sx] [gutter] [centro] [gutter] [dx] -->
<div class="wrap">
    <div class="grid">
        <aside class="panel left">
            <div class="scroll">
                <app-action-palette></app-action-palette>
            </div>
        </aside>

        <div class="gutter" (mousedown)="startDrag('left', $event)" matTooltip="Ridimensiona"
            matTooltipPosition="right"></div>

        <main class="panel center">
            <app-graph-editor (nodeSelect)="selectedNode = $event"></app-graph-editor>
            <div class="plugin-toast" [class.with-tooltip]="graphState.currentEdgeType | async" *ngIf="feedback.toast$ | async as toast">
                {{ toast }}
            </div>
        </main>

        <div class="gutter" (mousedown)="startDrag('right', $event)" matTooltip="Ridimensiona"
            matTooltipPosition="left"></div>

        <aside class="panel right" style="background: transparent; border: none; box-shadow: none;">
            <div class="panel-split-v">
                <!-- Top Half: Properties Panel -->
                <div class="split-pane top">
                    <div class="scroll" style="height: 100%; padding: 16px;">
                         <app-properties-panel [node]="selectedNode"></app-properties-panel>
                    </div>
                </div>
                
                <!-- Bottom Half: Tree View -->
                <div class="split-pane bottom">
                    <app-tree-view-panel></app-tree-view-panel>
                </div>
            </div>
        </aside>
    </div>
</div>

<div class="plugin-modal-backdrop" *ngIf="feedback.message$ | async as msg">
    <div class="plugin-modal" role="dialog" aria-modal="true" [attr.aria-label]="msg.title">
        <h3>{{ msg.title }}</h3>
        <p>{{ msg.text }}</p>
        <div class="actions" *ngIf="msg.mode === 'alert'">
            <button mat-raised-button color="primary" (click)="feedback.clear()">OK</button>
        </div>
        <div class="actions" *ngIf="msg.mode === 'confirm'">
            <button mat-stroked-button (click)="feedback.resolveConfirm(false)">{{ msg.cancelLabel || 'Annulla' }}</button>
            <button mat-raised-button color="primary" (click)="feedback.resolveConfirm(true)">{{ msg.confirmLabel || 'Conferma' }}</button>
        </div>
        <div class="prompt-input" *ngIf="msg.mode === 'prompt'">
            <input
                type="text"
                [(ngModel)]="feedbackPromptValue"
                [placeholder]="msg.placeholder || ''"
                autofocus
                (keydown.enter)="onPromptConfirm()"
            />
        </div>
        <div class="actions" *ngIf="msg.mode === 'prompt'">
            <button mat-stroked-button (click)="onPromptCancel()">{{ msg.cancelLabel || 'Annulla' }}</button>
            <button mat-raised-button color="primary" (click)="onPromptConfirm()">{{ msg.confirmLabel || 'Conferma' }}</button>
        </div>
    </div>
</div>
